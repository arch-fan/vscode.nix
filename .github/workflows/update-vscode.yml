name: Update VS Code Packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-vscode
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.1

      - name: Configure Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run updater
        run: nix run --impure path:$PWD#update

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail

          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No git worktree detected (likely local act run); forcing changed=true."
            exit 0
          fi

          if git diff --quiet -- versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read updated versions
        if: steps.changes.outputs.changed == 'true'
        id: versions
        run: |
          echo "stable=$(jq -r '.stable.version' versions.json)" >> "$GITHUB_OUTPUT"
          echo "insiders=$(jq -r '.insiders.version' versions.json)" >> "$GITHUB_OUTPUT"

      - name: Detect already proposed update
        if: steps.changes.outputs.changed == 'true'
        id: branch_state
        run: |
          set -euo pipefail

          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            echo "already_proposed=false" >> "$GITHUB_OUTPUT"
            echo "No git worktree detected (likely local act run)."
            exit 0
          fi

          branch="automation/update-vscode"
          remote_ref="origin/$branch"

          if ! git fetch --no-tags --depth=1 origin "$branch:refs/remotes/origin/$branch"; then
            echo "already_proposed=false" >> "$GITHUB_OUTPUT"
            echo "No existing remote update branch."
            exit 0
          fi

          if git diff --quiet "$remote_ref" -- versions.json; then
            echo "already_proposed=true" >> "$GITHUB_OUTPUT"
            echo "Current update already exists in $remote_ref."
          else
            echo "already_proposed=false" >> "$GITHUB_OUTPUT"
            echo "New update delta detected vs $remote_ref."
          fi

      - name: Validate updated packages build on Linux
        if: ${{ github.actor != 'nektos/act' && steps.changes.outputs.changed == 'true' && steps.branch_state.outputs.already_proposed != 'true' }}
        run: nix build --impure path:$PWD#vscode path:$PWD#vscode-insiders --no-link

      - name: Create pull request
        if: ${{ github.actor != 'nektos/act' && steps.changes.outputs.changed == 'true' && steps.branch_state.outputs.already_proposed != 'true' }}
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.PR_CREATOR_TOKEN != '' && secrets.PR_CREATOR_TOKEN || github.token }}
          commit-message: "chore: update vscode to ${{ steps.versions.outputs.stable }} and insiders to ${{ steps.versions.outputs.insiders }}"
          title: "chore: update vscode to ${{ steps.versions.outputs.stable }} and insiders to ${{ steps.versions.outputs.insiders }}"
          body: |
            Automated update generated by `.github/workflows/update-vscode.yml`.

            This PR runs `nix run .#update`, queries the official VS Code update API, and refreshes pinned versions/hashes in `versions.json` for:
            - stable (`vscode`)
            - insiders (`vscode-insiders`)
            - x86_64-linux, aarch64-linux, armv7l-linux, x86_64-darwin, aarch64-darwin
          branch: automation/update-vscode
          delete-branch: true
          add-paths: |
            versions.json

      - name: Enable pull request auto-merge (native)
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.PR_CREATOR_TOKEN != '' && secrets.PR_CREATOR_TOKEN || github.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "$PR_NUMBER"
